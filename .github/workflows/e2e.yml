# .github/workflows/e2e.yml
# Frontend-only repo: Playwright starts Next (`npm run dev`); tests call the API on Render.
name: E2E Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        run: npm run test:e2e
        env:
          CI: true
          # No trailing slash. Optional repo variable E2E_API_URL overrides the default.
          NEXT_PUBLIC_API_URL: ${{ vars.E2E_API_URL || 'https://backend-7eop.onrender.com' }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
